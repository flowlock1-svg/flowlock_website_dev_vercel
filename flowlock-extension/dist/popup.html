<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #f9fafb;
            color: #111827;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .title {
            font-weight: 600;
            font-size: 16px;
        }

        .status-card {
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
            margin-bottom: 16px;
        }

        .status-label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .status-value {
            font-size: 14px;
            font-weight: 500;
        }

        .btn {
            width: 100%;
            padding: 8px 16px;
            background-color: #6366f1;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #4f46e5;
        }

        .hidden {
            display: none;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .error {
            color: #ef4444;
            font-size: 12px;
            margin-bottom: 8px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div style="width: 24px; height: 24px; background: #6366f1; border-radius: 4px;"></div>
        <div class="title">FlowLock Monitor</div>
    </div>

    <div id="login-view" class="hidden">
        <div class="status-card">
            <div class="status-label">Authentication Required</div>
            <p style="font-size: 13px; color: #4b5563; margin-top: 0;">Please log in with your FlowLock account to sync
                tracking data.</p>
            <input type="email" id="email" placeholder="Email" />
            <input type="password" id="password" placeholder="Password" />
            <div id="error-msg" class="error hidden"></div>
            <button id="login-btn" class="btn">Log In</button>
        </div>
    </div>

    <div id="active-view" class="hidden">
        <div class="status-card">
            <div class="status-label">Current Status</div>
            <div class="status-value">Active Monitoring</div>
            <div style="font-size: 12px; color: #10b981; margin-top: 4px;">Connected to Supabase</div>
        </div>

        <div class="status-card">
            <div class="status-label">Current Tab</div>
            <div id="current-domain" class="status-value" style="word-break: break-all;">-</div>
        </div>

        <button id="logout-btn" class="btn" style="background-color: #ef4444;">Log Out</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
